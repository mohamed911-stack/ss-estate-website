<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Icon Preview</title>
    <link rel="stylesheet" href="assets/css/icomoon.css">
    <style>
        .icon-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        .icon-item {
            text-align: center;
            width: 150px;
            border: 1px solid #ccc;
            padding: 10px;
        }
        .icon-item span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <!-- Generate icons dynamically or just hardcode some for now -->
        <script>
            const container = document.querySelector('.icon-container');
            for (let i = 1; i <= 68; i++) {
                const div = document.createElement('div');
                div.className = 'icon-item';
                div.innerHTML = `<span class="icon-icon${i}"></span><div>icon-icon${i}</div>`;
                container.appendChild(div);
            }
            // Add named icons too
            const named = ['curtain', 'sink', 'touch-screen', 'cctv-1', 'design', 'logo', 'phone', 'pic1', 'pic2', 'pic3', 'quotes'];
            named.forEach(name => {
                const div = document.createElement('div');
                div.className = 'icon-item';
                div.innerHTML = `<span class="icon-${name}"></span><div>icon-${name}</div>`;
                container.appendChild(div);
            });
        </script>
    </div>
</body>
</html>
